version: "2"

run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - revive
    - gocritic
    - gosec

  settings:
    revive:
      rules:
        - name: exported
          disabled: true
        - name: blank-imports
          severity: warning
        - name: context-as-argument
          severity: warning
        - name: dot-imports
          severity: warning
        - name: error-return
          severity: warning
        - name: error-strings
          severity: warning
        - name: increment-decrement
          severity: warning
        - name: var-naming
          disabled: true
        - name: package-comments
          disabled: true

    gocritic:
      enabled-tags:
        - diagnostic
        - style

    gosec:
      excludes:
        - G104  # Unhandled errors on deferred closes — handled case by case
        - G101  # False positives on API key field names and test fixtures
        - G117  # False positives on exported struct fields matching "secret" patterns
        - G602  # False positive on slice index after length check

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
